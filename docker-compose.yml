version: '3.8'

services:
    app:
        build: .
        container_name: crm_app
        volumes:
            - .:/var/www
        depends_on:
            - db
            - redis
        environment:
            APP_ENV: dev

    web:
        image: nginx:latest
        container_name: crm_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    db:
        image: mysql:8
        container_name: crm_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: crm
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3306:3306"

    redis:
        image: redis:alpine
        container_name: crm_redis

volumes:
    db_data: